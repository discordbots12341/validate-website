<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>K&J Superstore</title>
<style>
@import url('https://googleapis.com');

* { margin:0; padding:0; box-sizing:border-box; }
body { background:#aaa; font-family:'Lato', Arial, sans-serif; }

.page {
  width: 794px;
  min-height: 1123px;
  margin: 30px auto;
  box-shadow: 0 6px 30px rgba(0,0,0,0.35);
  position: relative;
  overflow: hidden;
}

/* ===== COVER ===== */
.cover {
  background: #f0e8d2;
  display: flex;
  flex-direction: column;
}
.cover::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(45deg, rgba(139,90,43,0.04) 0px, transparent 2px, transparent 10px),
    repeating-linear-gradient(-45deg, rgba(139,90,43,0.04) 0px, transparent 2px, transparent 10px);
  pointer-events: none;
  z-index: 0;
}

.logo-section {
  position: relative;
  z-index: 1;
  width: 100%;
  padding: 20px 20px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.logo-img {
  width: 100%;
  max-width: 754px;
  display: block;
  border-radius: 6px;
}

.manager-section {
  position: relative;
  z-index: 1;
  background: white;
  flex: 1;
  display: flex;
  align-items: center;
  padding: 36px 44px 30px;
  gap: 36px;
}

.manager-photo {
  width: 280px;
  height: 290px;
  flex-shrink: 0;
  border-radius: 5px;
  overflow: hidden;
  box-shadow: 3px 3px 14px rgba(0,0,0,0.2);
  transform: rotate(-2deg);
}

.manager-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
}

.manager-text {
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.manager-label {
  font-family: 'Lato', sans-serif;
  font-size: 52px;
  font-weight: 400;
  color: #111;
  line-height: 1.15;
}
.manager-name {
  font-family: 'Lato', sans-serif;
  font-size: 52px;
  font-weight: 400;
  color: #111;
  line-height: 1.15;
}

/* ===== PRODUCT PAGES ===== */
.product-page {
  background: white;
  display: flex;
  flex-direction: column;
  padding: 30px 40px 20px;
}

.products-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0px 10px;
}

.product-item {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding: 0 8px;
}

.star-container {
  position: relative;
  width: 320px;
  height: 300px;
  margin-bottom: 4px;
}

.star-container svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
}

.product-img {
  position: absolute;
  z-index: 3;
  font-size: 128px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -56%);
  line-height: 1;
  filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.12));
}

.prod-name {
  font-family: 'Lato', sans-serif;
  font-size: 30px;
  font-weight: 700;
  color: #111;
  margin-left: 12px;
  line-height: 1.2;
}
.prod-price {
  font-family: 'Lato', sans-serif;
  font-size: 30px;
  font-weight: 400;
  color: #111;
  margin-left: 12px;
}

@media print {
  body { background: white; }
  .page { margin:0; box-shadow:none; page-break-after:always; width:100%; }
}
</style>
</head>
<body>

<!-- PAGE 1: COVER -->

  <div class="logo-section">
    <img class="logo-img" src="/mnt/user-data/uploads/Screenshot_2026-05-29_11_30_02_AM.png" alt="K&J Superstore Logo">
  </div>
  <div class="manager-section">
    <div class="manager-photo">

    </div>
